<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Prayer Times"/>
  <meta name="theme-color" content="#000000"/>
  <title>Prayer Times</title>
  <link rel="manifest" href="manifest.json"/>
  <script src="./anime.min.js"></script>
  <style>
    /* ── Design Tokens ── */
    :root {
      --bg:          #000000;
      --bg2:         #0c0c0e;
      --bg3:         #1c1c1e;
      --fill1:       rgba(255,255,255,0.12);
      --fill2:       rgba(255,255,255,0.08);
      --fill3:       rgba(255,255,255,0.05);
      --sep:         rgba(255,255,255,0.10);
      --label1:      rgba(255,255,255,1.00);
      --label2:      rgba(255,255,255,0.60);
      --label3:      rgba(255,255,255,0.30);
      --label4:      rgba(255,255,255,0.16);
      --accent:      #c4a461;
      --accent-soft: rgba(196,164,97,0.18);
      --accent-glow: rgba(196,164,97,0.10);
      --radius-sm:   12px;
      --radius-md:   16px;
      --radius-lg:   22px;
      --radius-xl:   28px;
      --spring:      cubic-bezier(0.34,1.56,0.64,1);
      --ease-out:    cubic-bezier(0.22,1,0.36,1);
      --ease-in-out: cubic-bezier(0.4,0,0.2,1);
    }

    /* ── Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      height: 100%; height: -webkit-fill-available;
      background: var(--bg);
    }
    body {
      min-height: 100vh; min-height: -webkit-fill-available; min-height: 100dvh;
      background: var(--bg);
      color: var(--label1);
      font-family: -apple-system, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
    }
    .app {
      height: 100vh; height: -webkit-fill-available; height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ── Keyframes ── */
    @keyframes hb {
      0%   { transform: scale(1.0); opacity: 0; }
      6%   { transform: scale(1.08); opacity: 0.22; }
      12%  { transform: scale(1.0); opacity: 0.10; }
      20%  { transform: scale(1.05); opacity: 0.16; }
      28%  { transform: scale(1.0); opacity: 0.06; }
      100% { transform: scale(1.0); opacity: 0; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes rowIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pgrow {
      from { width: 0%; }
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 1px rgba(196,164,97,0.25), 0 2px 20px rgba(196,164,97,0.10); }
      50%       { box-shadow: 0 0 0 1px rgba(196,164,97,0.45), 0 2px 32px rgba(196,164,97,0.22); }
    }
    @keyframes dotPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.35; transform: scale(0.65); }
    }
    @keyframes quoteSlide {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Global prayer background — entire UI color-shifts to match current prayer ── */
    #bg-tint {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      background-color: #08080c;
      opacity: 1;
      transition: background-color 1.6s ease;
    }

    /* ── Heartbeat overlay ── */
    .hb-ring {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse at 50% 40%, var(--accent-glow) 0%, transparent 60%);
      opacity: 0; transform: scale(1);
      display: none;
    }
    .hb-ring.on { display: block; animation: hb 1.5s ease-in-out infinite; }

    /* ── Pages ── */
    .pages { flex: 1; overflow: hidden; position: relative; min-height: 0; }
    .page  {
      position: absolute; inset: 0;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      opacity: 0; pointer-events: none;
      transition: opacity 0.22s var(--ease-out);
      display: flex; flex-direction: column;
    }
    .page::-webkit-scrollbar { display: none; }
    .page.active { opacity: 1; pointer-events: all; }

    /* ── Hero ── */
    .hero {
      flex-shrink: 0;
      padding: max(env(safe-area-inset-top), 56px) 20px 20px;
      position: relative; text-align: center; overflow: hidden;
      background: linear-gradient(180deg, var(--bg-hero, #050a18) 0%, var(--bg) 100%);
      transition: background 2.4s var(--ease-in-out);
    }
    .hero::before {
      content: "";
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, var(--hero-glow, rgba(196,164,97,0.10)) 0%, transparent 65%);
      pointer-events: none;
      transition: background 2.4s var(--ease-in-out);
    }
    .notif-btn {
      position: absolute;
      top: max(env(safe-area-inset-top), 16px); right: 16px;
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--fill1);
      border: none; outline: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; cursor: pointer;
      transition: transform 0.15s var(--ease-out), background 0.2s;
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
    }
    .notif-btn:active { transform: scale(0.88); }
    .notif-btn.on { background: var(--accent-soft); }

    /* hero meta row */
    .hero-meta {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; margin-bottom: 2px;
      animation: fadeIn 0.4s ease both;
    }
    .hero-date    { font-size: 15px; font-weight: 600; color: var(--label1); letter-spacing: -0.2px; }
    .hero-sep     { font-size: 12px; color: var(--label4); }
    .hero-city    { font-size: 13px; font-weight: 500; color: var(--label3); }
    .hero-hijri   { font-size: 12px; color: var(--label4); margin-bottom: 18px; animation: fadeIn 0.4s 0.04s ease both; }

    .hero-label   { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); opacity: 0.85; animation: fadeUp 0.4s 0.08s var(--ease-out) both; }
    .hero-name    {
      font-size: 56px; font-weight: 700; letter-spacing: -1.5px; line-height: 1;
      color: var(--label1);
      animation: fadeUp 0.5s 0.10s var(--ease-out) both;
      font-variant-numeric: tabular-nums;
    }
    .hero-time    {
      font-size: 72px; font-weight: 200; letter-spacing: -3px; line-height: 1.05;
      color: var(--label1); font-variant-numeric: tabular-nums;
      margin-bottom: 18px;
      animation: fadeUp 0.5s 0.13s var(--ease-out) both;
    }

    /* progress */
    .prog-track { width: 100%; height: 2px; background: var(--fill2); border-radius: 1px; overflow: hidden; }
    .prog-fill  { height: 100%; background: var(--accent); border-radius: 1px; animation: pgrow 1s 0.4s var(--ease-out) both; transition: width 1s linear; }
    .prog-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--label4); margin-top: 5px; margin-bottom: 14px; }

    /* countdown pill */
    .cd-pill {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--fill2);
      border: 1px solid var(--sep);
      border-radius: 100px; padding: 9px 20px;
      font-size: 13px; font-weight: 600; color: var(--label2);
      letter-spacing: -0.1px;
      -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
      animation: fadeIn 0.4s 0.5s ease both;
    }
    .cd-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; animation: dotPulse 1.5s ease-in-out infinite; }

    /* toast */
    .toast {
      position: absolute; bottom: -48px; left: 50%; transform: translateX(-50%);
      background: rgba(28,28,30,0.95); border: 1px solid var(--sep);
      border-radius: 100px; padding: 9px 20px; font-size: 13px; font-weight: 600;
      color: var(--accent); white-space: nowrap; pointer-events: none;
      transition: bottom 0.35s var(--spring);
      -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
    }
    .toast.show { bottom: 14px; }

    /* ── Prayer list ── */
    .list {
      flex: 1; display: flex; flex-direction: column;
      padding: 12px 16px max(env(safe-area-inset-bottom), 10px);
      gap: 8px; min-height: 0;
    }
    /* per-prayer color tokens */
    :root {
      --fajr:    #7eb8f7; --fajr-soft:    rgba(126,184,247,0.15); --fajr-glow:    rgba(126,184,247,0.22);
      --dhuhr:   #f5d060; --dhuhr-soft:   rgba(245,208,96,0.15);  --dhuhr-glow:   rgba(245,208,96,0.22);
      --asr:     #f0a050; --asr-soft:     rgba(240,160,80,0.15);  --asr-glow:     rgba(240,160,80,0.22);
      --maghrib: #e8624a; --maghrib-soft: rgba(232,98,74,0.15);   --maghrib-glow: rgba(232,98,74,0.22);
      --isha:    #9b7fd4; --isha-soft:    rgba(155,127,212,0.15); --isha-glow:    rgba(155,127,212,0.22);
    }

    .row {
      flex: 1; min-height: 68px; max-height: 100px;
      display: flex; align-items: center;
      padding: 0 16px; border-radius: var(--radius-lg);
      transition: transform 0.18s var(--ease-out), opacity 0.3s ease;
      cursor: default;
    }
    .row.passed   { background: rgba(255,255,255,0.04); opacity: 0.38; }
    .row.upcoming { background: rgba(255,255,255,0.07); }

    /* active state uses prayer-specific color */
    .row.active { background: linear-gradient(135deg, var(--row-soft) 0%, rgba(0,0,0,0) 100%); }
    .row[data-p="fajr"].active    { --row-soft:var(--fajr-soft);    box-shadow:0 0 0 1px var(--fajr-glow),   0 4px 24px var(--fajr-soft);    animation:pulseGlowP 2.8s ease-in-out infinite; }
    .row[data-p="dhuhr"].active   { --row-soft:var(--dhuhr-soft);   box-shadow:0 0 0 1px var(--dhuhr-glow),  0 4px 24px var(--dhuhr-soft);   animation:pulseGlowP 2.8s ease-in-out infinite; }
    .row[data-p="asr"].active     { --row-soft:var(--asr-soft);     box-shadow:0 0 0 1px var(--asr-glow),    0 4px 24px var(--asr-soft);     animation:pulseGlowP 2.8s ease-in-out infinite; }
    .row[data-p="maghrib"].active { --row-soft:var(--maghrib-soft); box-shadow:0 0 0 1px var(--maghrib-glow),0 4px 24px var(--maghrib-soft); animation:pulseGlowP 2.8s ease-in-out infinite; }
    .row[data-p="isha"].active    { --row-soft:var(--isha-soft);    box-shadow:0 0 0 1px var(--isha-glow),   0 4px 24px var(--isha-soft);    animation:pulseGlowP 2.8s ease-in-out infinite; }

    @keyframes pulseGlowP {
      0%,100% { opacity:1; }
      50%      { opacity:0.85; }
    }

    .row.in { animation: rowIn 0.38s var(--ease-out) both; }
    .row.upcoming:active, .row.active:active { transform: scale(0.975); }

    .row-icon {
      width: 44px; height: 44px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; margin-right: 14px; flex-shrink: 0;
      transition: background 0.3s ease;
    }
    .row.passed .row-icon   { background: var(--fill2); }
    .row.upcoming .row-icon { background: var(--fill2); }

    /* icon backgrounds per prayer */
    .row[data-p="fajr"].active    .row-icon { background: var(--fajr-soft); }
    .row[data-p="dhuhr"].active   .row-icon { background: var(--dhuhr-soft); }
    .row[data-p="asr"].active     .row-icon { background: var(--asr-soft); }
    .row[data-p="maghrib"].active .row-icon { background: var(--maghrib-soft); }
    .row[data-p="isha"].active    .row-icon { background: var(--isha-soft); }

    /* upcoming rows get a subtle tint on their icon */
    .row[data-p="fajr"].upcoming    .row-icon { background: rgba(126,184,247,0.07); }
    .row[data-p="dhuhr"].upcoming   .row-icon { background: rgba(245,208,96,0.07); }
    .row[data-p="asr"].upcoming     .row-icon { background: rgba(240,160,80,0.07); }
    .row[data-p="maghrib"].upcoming .row-icon { background: rgba(232,98,74,0.07); }
    .row[data-p="isha"].upcoming    .row-icon { background: rgba(155,127,212,0.07); }

    .row-info { flex: 1; min-width: 0; }
    .row-name { font-size: 17px; font-weight: 600; color: var(--label1); letter-spacing: -0.2px; line-height: 1.2; }
    .row-ar   { font-size: 12px; color: var(--label4); margin-top: 2px; }

    /* active name color per prayer */
    .row[data-p="fajr"].active    .row-name { color: var(--fajr); }
    .row[data-p="dhuhr"].active   .row-name { color: var(--dhuhr); }
    .row[data-p="asr"].active     .row-name { color: var(--asr); }
    .row[data-p="maghrib"].active .row-name { color: var(--maghrib); }
    .row[data-p="isha"].active    .row-name { color: var(--isha); }

    .row-right { text-align: right; flex-shrink: 0; }
    .row-time  { font-size: 17px; font-weight: 600; color: var(--label1); font-variant-numeric: tabular-nums; letter-spacing: -0.3px; }
    .row-badge {
      display: inline-block; margin-top: 4px;
      font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: #000; border-radius: 6px; padding: 2px 8px;
    }
    .row[data-p="fajr"]    .row-badge { background: var(--fajr); }
    .row[data-p="dhuhr"]   .row-badge { background: var(--dhuhr); }
    .row[data-p="asr"]     .row-badge { background: var(--asr); }
    .row[data-p="maghrib"] .row-badge { background: var(--maghrib); color: #fff; }
    .row[data-p="isha"]    .row-badge { background: var(--isha); color: #fff; }

    /* ── Tab bar — iOS frosted glass ── */
    .tabs {
      display: flex;
      background: rgba(10,10,12,0.92);
      -webkit-backdrop-filter: saturate(180%) blur(24px);
      backdrop-filter: saturate(180%) blur(24px);
      border-top: 0.5px solid rgba(255,255,255,0.10);
      padding: 10px 0 max(env(safe-area-inset-bottom), 20px);
      flex-shrink: 0;
      position: relative; z-index: 10;
    }
    /* fill the gap between tab bar and very bottom edge */
    .tabs::after {
      content: "";
      position: absolute; left: 0; right: 0; top: 100%;
      height: env(safe-area-inset-bottom, 0px);
      background: rgba(10,10,12,0.92);
      pointer-events: none;
    }
    .tab {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 3px; padding: 4px 0; cursor: pointer;
      transition: opacity 0.15s ease;
    }
    .tab:active { opacity: 0.6; }
    .tab-icon  { font-size: 22px; line-height: 1; transition: transform 0.2s var(--spring); }
    .tab-label { font-size: 10px; font-weight: 500; letter-spacing: 0.02em; color: var(--label3); transition: color 0.15s; }
    .tab.active .tab-label { color: var(--accent); }
    .tab.active .tab-icon  { transform: scale(1.08); }

    /* ── Qibla ── */
    .qibla-wrap {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: max(env(safe-area-inset-top), 52px) 24px 24px;
    }
    .q-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--label3); margin-bottom: 4px; animation: fadeIn 0.4s ease both; }
    .q-title   { font-size: 34px; font-weight: 700; letter-spacing: -0.5px; color: var(--label1); margin-bottom: 32px; animation: fadeUp 0.4s 0.06s var(--ease-out) both; }

    .compass   { position: relative; width: 240px; height: 240px; margin: 0 auto 28px; animation: fadeIn 0.5s 0.15s ease both; }
    .c-ring    {
      position: absolute; inset: 0; border-radius: 50%;
      background: var(--bg3);
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
    }
    .c-ring::before { content:"N"; position:absolute; top:12px; left:50%; transform:translateX(-50%); font-size:12px; font-weight:700; color:var(--label3); }
    .c-ring::after  { content:"S"; position:absolute; bottom:12px; left:50%; transform:translateX(-50%); font-size:12px; font-weight:700; color:var(--label4); }
    .c-e { position:absolute; right:13px; top:50%; transform:translateY(-50%); font-size:12px; font-weight:700; color:var(--label4); }
    .c-w { position:absolute; left:13px;  top:50%; transform:translateY(-50%); font-size:12px; font-weight:700; color:var(--label4); }

    .c-needle  { position:absolute; inset:0; border-radius:50%; transition:transform 0.25s ease; display:flex; align-items:center; justify-content:center; }
    .c-line    { position:absolute; width:2px; height:88px; background:linear-gradient(to bottom,var(--accent),rgba(196,164,97,0.05)); border-radius:2px; top:50%; left:50%; transform:translateX(-50%) translateY(-100%); }
    .c-dot     { position:absolute; width:10px; height:10px; border-radius:50%; background:var(--accent); top:50%; left:50%; transform:translate(-50%,-50%); box-shadow:0 0 10px var(--accent); }
    .c-kaaba   { position:absolute; top:20px; left:50%; transform:translateX(-50%); font-size:26px; filter:drop-shadow(0 0 8px rgba(196,164,97,0.5)); }

    .q-bearing { font-size: 52px; font-weight: 200; letter-spacing: -2px; color: var(--accent); font-variant-numeric: tabular-nums; text-align: center; animation: fadeUp 0.4s 0.3s var(--ease-out) both; }
    .q-sub     { font-size: 13px; color: var(--label3); margin-top: 2px; text-align: center; animation: fadeIn 0.4s 0.35s ease both; }

    .q-btn {
      margin-top: 24px; width: 100%; max-width: 280px;
      background: var(--fill2); border: 1px solid var(--sep); border-radius: var(--radius-xl);
      padding: 16px 20px; text-align: center; cursor: pointer;
      transition: transform 0.15s var(--ease-out), background 0.15s;
      animation: fadeUp 0.4s 0.4s var(--ease-out) both;
      -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
    }
    .q-btn:active { transform: scale(0.97); background: var(--fill1); }
    .q-btn-title { font-size: 15px; font-weight: 600; color: var(--label1); margin-top: 6px; }
    .q-btn-sub   { font-size: 12px; color: var(--label3); margin-top: 4px; line-height: 1.4; }

    /* ── Quote ── */
    @keyframes quoteReveal {
      0%   { opacity: 0; transform: translateY(18px) scale(0.98); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes ornamentFade {
      from { opacity: 0; transform: scaleX(0.6); }
      to   { opacity: 1; transform: scaleX(1); }
    }
    .quote-wrap {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: max(env(safe-area-inset-top), 52px) 32px max(env(safe-area-inset-bottom), 32px);
      text-align: center; position: relative; overflow: hidden;
    }
    .quote-wrap::before {
      content: "";
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 30%, rgba(196,164,97,0.06) 0%, transparent 65%);
      pointer-events: none;
    }
    .q-tag {
      font-size: 10px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(196,164,97,0.45); margin-bottom: 40px;
    }
    .q-ornament-top {
      display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
      animation: ornamentFade 0.6s var(--ease-out) both;
    }
    .q-orn-line { flex: 1; height: 0.5px; background: linear-gradient(90deg, transparent, rgba(196,164,97,0.35), transparent); max-width: 60px; }
    .q-orn-diamond {
      width: 6px; height: 6px; background: var(--accent);
      transform: rotate(45deg); opacity: 0.7;
    }
    .q-mark {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 80px; font-weight: 300; font-style: italic;
      color: rgba(196,164,97,0.18); line-height: 0.6;
      margin-bottom: 20px; display: block;
      animation: ornamentFade 0.5s 0.1s var(--ease-out) both;
    }
    .q-text {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 26px; font-weight: 400; font-style: italic;
      color: var(--label1); line-height: 1.6; letter-spacing: 0.01em;
      margin-bottom: 24px; max-width: 320px;
      animation: quoteReveal 0.55s var(--ease-out) both;
    }
    .q-source {
      font-family: -apple-system, sans-serif;
      font-size: 12px; font-weight: 600; color: var(--accent);
      letter-spacing: 0.12em; text-transform: uppercase;
      animation: quoteReveal 0.5s 0.08s var(--ease-out) both;
    }
    .q-ornament-bot {
      display: flex; align-items: center; gap: 12px; margin-top: 28px; margin-bottom: 32px;
      animation: ornamentFade 0.6s 0.15s var(--ease-out) both;
    }
    .q-new {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--fill2); border: 0.5px solid rgba(196,164,97,0.25);
      border-radius: 100px; padding: 13px 28px;
      font-family: -apple-system, sans-serif;
      font-size: 13px; font-weight: 600; color: rgba(196,164,97,0.8);
      cursor: pointer; touch-action: manipulation;
      transition: transform 0.15s var(--ease-out), background 0.15s, opacity 0.15s;
      -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
      min-height: 44px;
    }
    .q-new:active { transform: scale(0.95); opacity: 0.7; }
    .q-notif-row {
      display: flex; align-items: center; gap: 8px; margin-top: 16px;
      font-family: -apple-system, sans-serif;
      font-size: 12px; color: var(--label3);
    }
    .q-notif-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); opacity: 0.5; }

    /* ── Full-Screen Prayer Detail ── */
    .detail-screen {
      position: fixed; inset: 0; z-index: 60;
      background: var(--bg, #08080c);
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      display: none;
      will-change: transform;
      transition: background-color 1.6s ease;
    }
    .detail-nav {
      position: sticky; top: 0; z-index: 5;
      padding: max(env(safe-area-inset-top), 50px) 20px 14px;
      display: flex; align-items: flex-end; gap: 12px;
      background: rgba(0,0,0,0.45);
      -webkit-backdrop-filter: saturate(200%) blur(28px);
      backdrop-filter: saturate(200%) blur(28px);
      border-bottom: 0.5px solid rgba(255,255,255,0.06);
    }
    .detail-back {
      display: flex; align-items: center; gap: 2px;
      font-size: 17px; color: var(--detail-color, var(--accent));
      background: none; border: none; outline: none;
      cursor: pointer; padding: 0; min-height: 44px; min-width: 44px;
      touch-action: manipulation;
      transition: opacity 0.15s;
    }
    .detail-back:active { opacity: 0.6; }
    .detail-back-arrow { font-size: 24px; font-weight: 200; line-height: 1; }
    .detail-back-label { font-size: 17px; font-weight: 400; }
    .detail-nav-title {
      flex: 1; text-align: center;
      font-size: 17px; font-weight: 600; color: var(--label1); letter-spacing: -0.2px;
      margin-right: 44px;
    }

    .detail-hero-section {
      padding: 40px 28px 36px;
      text-align: center; position: relative; overflow: hidden;
    }
    .detail-hero-section::before {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, var(--detail-glow, transparent) 0%, transparent 70%);
    }
    .detail-hero-section::after {
      content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--detail-color, transparent), transparent);
      opacity: 0.25;
    }
    .detail-big-icon {
      width: 96px; height: 96px; border-radius: 28px; margin: 0 auto 24px;
      display: flex; align-items: center; justify-content: center; font-size: 48px;
      background: var(--detail-soft, rgba(255,255,255,0.06));
      box-shadow: 0 0 0 1px var(--detail-color, transparent), 0 8px 32px var(--detail-soft, transparent);
    }
    .detail-en {
      font-size: 52px; font-weight: 700; letter-spacing: -1.5px; line-height: 1;
      color: var(--detail-color, var(--label1)); margin-bottom: 6px;
    }
    .detail-ar {
      font-size: 20px; font-weight: 300; color: rgba(255,255,255,0.35);
      margin-bottom: 20px;
      font-family: "Cormorant Garamond", Georgia, serif; font-style: italic;
    }
    .detail-time {
      font-size: 68px; font-weight: 200; letter-spacing: -3px; line-height: 1;
      color: var(--label1); font-variant-numeric: tabular-nums;
      margin-bottom: 12px;
    }
    .detail-desc {
      font-size: 14px; font-weight: 400; color: var(--label3); letter-spacing: 0.01em;
    }

    .detail-content {
      padding: 16px 16px max(env(safe-area-inset-bottom), 48px);
      display: flex; flex-direction: column; gap: 12px;
    }
    .d-card {
      background: rgba(255,255,255,0.07);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      backdrop-filter: saturate(180%) blur(20px);
      border: 0.5px solid rgba(255,255,255,0.10);
      border-radius: 20px; padding: 18px 20px;
    }
    .d-card-label {
      font-size: 11px; font-weight: 600; letter-spacing: 0.14em;
      text-transform: uppercase; color: rgba(255,255,255,0.22);
      margin-bottom: 14px;
    }

    .rakat-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .rakat-chip {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.07);
      border: 0.5px solid rgba(255,255,255,0.09);
      border-radius: 100px; padding: 8px 14px;
      opacity: 0;
    }
    .rakat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .rakat-label { font-size: 14px; font-weight: 600; color: var(--label1); }
    .rakat-sub {
      font-size: 11px; font-weight: 400;
      color: rgba(255,255,255,0.3); margin-left: 2px;
    }

    .d-window-times {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 14px;
    }
    .d-wt { font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--label1); }
    .d-wt.end { font-weight: 300; color: var(--label3); }
    .d-window-bar { height: 4px; border-radius: 2px; overflow: hidden; background: rgba(255,255,255,0.08); }
    .d-window-fill { height: 100%; border-radius: 2px; width: 0%; }

    .d-hadith-mark {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 72px; font-weight: 300; font-style: italic;
      color: var(--detail-color, var(--accent)); opacity: 0.28;
      line-height: 0.7; display: block; margin-bottom: 16px;
    }
    .d-hadith-text {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 22px; font-style: italic; font-weight: 400;
      color: var(--label1); line-height: 1.65; margin-bottom: 14px;
    }
    .d-hadith-src {
      font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--detail-color, var(--accent)); opacity: 0.65;
    }
  </style>
</head>
<body>
<div id="bg-tint"></div>
<div class="hb-ring" id="hb"></div>
<div class="app">
  <div class="pages">

    <!-- Prayers -->
    <div class="page active" id="page-prayers">
      <div class="hero" id="hero">
        <button class="notif-btn" id="notif-btn">🔔</button>
        <div class="toast" id="toast"></div>
        <div class="hero-meta">
          <span class="hero-date" id="hero-date"></span>
          <span class="hero-sep">·</span>
          <span class="hero-city" id="hero-city">Sharjah</span>
        </div>
        <div class="hero-hijri" id="hero-hijri"></div>
        <div class="hero-label" id="hero-label">Next prayer</div>
        <div class="hero-name"  id="hero-name"></div>
        <div class="hero-time"  id="hero-time"></div>
        <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
        <div class="prog-labels"><span id="prog-l"></span><span id="prog-r"></span></div>
        <div class="cd-pill"><div class="cd-dot"></div><span id="cd">—</span></div>
      </div>
      <div class="list" id="list"></div>
    </div>

    <!-- Qibla -->
    <div class="page" id="page-qibla">
      <div class="qibla-wrap">
        <div class="q-eyebrow">Direction of Prayer</div>
        <div class="q-title">Qibla</div>
        <div class="compass">
          <div class="c-ring"><span class="c-e">E</span><span class="c-w">W</span></div>
          <div class="c-needle" id="needle">
            <div class="c-line"></div>
            <div class="c-dot"></div>
            <div class="c-kaaba">🕋</div>
          </div>
        </div>
        <div class="q-bearing" id="q-bearing">247°</div>
        <div class="q-sub">from North · towards Mecca</div>
        <div class="q-btn" id="q-btn">
          <div style="font-size:22px">🧭</div>
          <div class="q-btn-title">Enable Live Compass</div>
          <div class="q-btn-sub">Use your phone sensor for real-time direction</div>
        </div>
      </div>
    </div>

    <!-- Quote -->
    <div class="page" id="page-quote">
      <div class="quote-wrap">
        <div class="q-tag">Daily Reminder</div>
        <div class="q-ornament-top">
          <div class="q-orn-line"></div>
          <div class="q-orn-diamond"></div>
          <div class="q-orn-line"></div>
        </div>
        <div class="q-mark">&ldquo;</div>
        <div class="q-text"   id="q-text"></div>
        <div class="q-source" id="q-src"></div>
        <div class="q-ornament-bot">
          <div class="q-orn-line"></div>
          <div class="q-orn-diamond"></div>
          <div class="q-orn-line"></div>
        </div>
        <div class="q-new" id="q-new">↻ &ensp;New quote</div>
        <div class="q-notif-row" id="q-notif-row">
          <div class="q-notif-dot"></div>
          <span id="q-notif-label">Enable notifications to receive daily reminders</span>
        </div>
      </div>
    </div>

  </div>

  <!-- Tab bar -->
  <div class="tabs">
    <div class="tab active" data-p="prayers" id="tab-prayers">
      <div class="tab-icon">🕌</div>
      <div class="tab-label">Prayers</div>
    </div>
    <div class="tab" data-p="qibla" id="tab-qibla">
      <div class="tab-icon">🧭</div>
      <div class="tab-label">Qibla</div>
    </div>
    <div class="tab" data-p="quote" id="tab-quote">
      <div class="tab-icon">📖</div>
      <div class="tab-label">Reminder</div>
    </div>
  </div>
</div>

<!-- Full-Screen Prayer Detail -->
<div class="detail-screen" id="detail-screen" style="display:none">
  <div class="detail-nav">
    <button class="detail-back" id="detail-back-btn" onclick="closeDetail()">
      <span class="detail-back-arrow">‹</span>
      <span class="detail-back-label">Prayers</span>
    </button>
    <div class="detail-nav-title" id="d-nav-title"></div>
  </div>
  <div class="detail-hero-section">
    <div class="detail-big-icon" id="d-icon"></div>
    <div class="detail-en" id="d-name"></div>
    <div class="detail-ar" id="d-ar"></div>
    <div class="detail-time" id="d-time"></div>
    <div class="detail-desc" id="d-desc"></div>
  </div>
  <div class="detail-content">
    <div class="d-card" id="d-card-rakats">
      <div class="d-card-label">Rakats</div>
      <div class="rakat-row" id="d-rakats"></div>
    </div>
    <div class="d-card" id="d-card-window">
      <div class="d-card-label">Prayer Window</div>
      <div class="d-window-times">
        <span class="d-wt" id="d-wstart"></span>
        <span class="d-wt end" id="d-wend"></span>
      </div>
      <div class="d-window-bar"><div class="d-window-fill" id="d-wfill"></div></div>
    </div>
    <div class="d-card" id="d-card-hadith">
      <div class="d-card-label">Hadith</div>
      <span class="d-hadith-mark">&ldquo;</span>
      <div class="d-hadith-text" id="d-hadith"></div>
      <div class="d-hadith-src" id="d-hadith-src"></div>
    </div>
  </div>
</div>

<script>
const PRAYERS=[
  {key:"fajr",   en:"Fajr",   ar:"الفجر",  icon:"🌄"},
  {key:"dhuhr",  en:"Dhuhr",  ar:"الظهر",  icon:"☀️"},
  {key:"asr",    en:"Asr",    ar:"العصر",  icon:"🌅"},
  {key:"maghrib",en:"Maghrib",ar:"المغرب", icon:"🌆"},
  {key:"isha",   en:"Isha",   ar:"العشاء", icon:"🌙"},
];
const QUOTES=[{"text": "Indeed, with hardship comes ease.", "source": "Quran 94:6"}, {"text": "Allah does not burden a soul beyond that it can bear.", "source": "Quran 2:286"}, {"text": "And He is with you wherever you are.", "source": "Quran 57:4"}, {"text": "Verily, the remembrance of Allah brings comfort to the heart.", "source": "Quran 13:28"}, {"text": "So remember Me; I will remember you.", "source": "Quran 2:152"}, {"text": "Call upon Me; I will respond to you.", "source": "Quran 40:60"}, {"text": "And seek help through patience and prayer.", "source": "Quran 2:45"}, {"text": "Do not lose hope, nor be sad.", "source": "Quran 3:139"}, {"text": "Speak good or remain silent.", "source": "Bukhari & Muslim"}, {"text": "The best of people are those who benefit others.", "source": "Al-Tabarani"}, {"text": "Smile at your brother \u2014 it is an act of charity.", "source": "Tirmidhi"}, {"text": "None of you truly believes until he loves for his brother what he loves for himself.", "source": "Bukhari & Muslim"}, {"text": "The strong person is one who controls themselves in anger.", "source": "Bukhari"}, {"text": "Make things easy and do not make them difficult.", "source": "Bukhari"}, {"text": "Be in this world as if you are a stranger or a traveller.", "source": "Bukhari"}, {"text": "Take advantage of five before five: youth, health, wealth, free time, and life.", "source": "Hakim"}, {"text": "The best among you are those who have the best manners and character.", "source": "Bukhari"}, {"text": "Allah is beautiful and loves beauty.", "source": "Muslim"}, {"text": "Kindness is a mark of faith, and whoever has no kindness has no faith.", "source": "Muslim"}, {"text": "Every act of kindness is charity.", "source": "Bukhari"}, {"text": "He who does not thank people, does not thank Allah.", "source": "Ahmad"}, {"text": "Verily Allah does not look at your appearance or wealth, but rather He looks at your hearts and actions.", "source": "Muslim"}, {"text": "Whoever walks a path seeking knowledge, Allah will make easy for him a path to Paradise.", "source": "Muslim"}, {"text": "The best charity is that given when you yourself are in need.", "source": "Bukhari"}, {"text": "O Turner of hearts, keep our hearts firm on Your religion.", "source": "Tirmidhi"}, {"text": "Feed the hungry, visit the sick, and free the captive.", "source": "Bukhari"}, {"text": "The world is a prison for the believer and a paradise for the disbeliever.", "source": "Muslim"}, {"text": "Whoever believes in Allah and the Last Day, let him say something good or remain silent.", "source": "Bukhari"}];
const THEMES={
  // bg   = deep immersive background (entire UI color-shifts here)
  // hero = slightly richer gradient layer on top of bg
  // accent = bright UI color for labels, icons, highlights
  fajr:   {bg:"#00061c",hero:"#04091a",glow:"rgba(100,150,255,0.22)",accent:"#6ab4ff",accentSoft:"rgba(106,180,255,0.18)"},
  dhuhr:  {bg:"#160b00",hero:"#1a0e00",glow:"rgba(255,185,50,0.22)", accent:"#ffb830",accentSoft:"rgba(255,184,48,0.18)"},
  asr:    {bg:"#130900",hero:"#170c00",glow:"rgba(255,145,45,0.22)",  accent:"#ff9a38",accentSoft:"rgba(255,154,56,0.18)"},
  maghrib:{bg:"#160003",hero:"#1a0205",glow:"rgba(255,75,60,0.22)",   accent:"#ff5a47",accentSoft:"rgba(255,90,71,0.18)"},
  isha:   {bg:"#08031a",hero:"#0b0520",glow:"rgba(175,115,255,0.22)", accent:"#b07aff",accentSoft:"rgba(176,122,255,0.18)"},
  default:{bg:"#08080c",hero:"#0a0a12",glow:"rgba(196,164,97,0.12)",  accent:"#c4a461",accentSoft:"rgba(196,164,97,0.18)"},
};
let LAT=25.3463,LNG=55.4209;

function calcT(d){
  const c=new adhan.Coordinates(LAT,LNG);
  const p=adhan.CalculationMethod.UmmAlQura();
  p.madhab=adhan.Madhab.Shafi;
  const t=new adhan.PrayerTimes(c,d,p);
  return{fajr:t.fajr,dhuhr:t.dhuhr,asr:t.asr,maghrib:t.maghrib,isha:t.isha};
}
function fmt(d){return d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true});}
function hijri(d){try{return d.toLocaleDateString("en-US-u-ca-islamic",{day:"numeric",month:"long",year:"numeric"});}catch(e){return "";}}

// tabs
document.querySelectorAll(".tab").forEach(t=>{
  t.addEventListener("click",()=>{
    const p=t.dataset.p;
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    document.getElementById("page-"+p).classList.add("active");
    if(p==="quote") renderQ();
  });
});

let lastAIdx=-1;
function render(){
  const now=new Date();
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const T=calcT(today);
  const keys=PRAYERS.map(p=>p.key);

  document.getElementById("hero-date").textContent=now.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"});
  document.getElementById("hero-hijri").textContent=hijri(now);

  // aIdx = last prayer that has started (we are currently in this prayer's window)
  let aIdx=-1;
  for(let i=0;i<keys.length;i++) if(now>=T[keys[i]]) aIdx=i;
  // nIdx = next prayer that hasn't started yet
  let nIdx=-1;
  for(let i=0;i<keys.length;i++) if(T[keys[i]]>now){nIdx=i;break;}

  const SWITCH_WINDOW = 30 * 60 * 1000; // 30 mins in ms
  const minsUntilNext = nIdx>=0 ? (T[keys[nIdx]] - now) : Infinity;
  const showNext = minsUntilNext <= SWITCH_WINDOW; // within 30 min of next prayer

  // hero shows CURRENT prayer unless within 30 min of next prayer
  if(aIdx>=0 && !showNext){
    document.getElementById("hero-label").textContent="Current Prayer";
    document.getElementById("hero-name").textContent=PRAYERS[aIdx].en;
    document.getElementById("hero-time").textContent=fmt(T[keys[aIdx]]);
  } else if(nIdx>=0){
    document.getElementById("hero-label").textContent="Next Prayer";
    document.getElementById("hero-name").textContent=PRAYERS[nIdx].en;
    document.getElementById("hero-time").textContent=fmt(T[keys[nIdx]]);
  } else {
    // past Isha, waiting for Fajr
    const tm=new Date(today);tm.setDate(tm.getDate()+1);
    const fajrTm=calcT(tm).fajr;
    document.getElementById("hero-label").textContent="Next Prayer";
    document.getElementById("hero-name").textContent="Fajr";
    document.getElementById("hero-time").textContent=fmt(fajrTm);
  }

  // progress bar: from current prayer start → next prayer start
  let nTime;
  if(nIdx>=0){
    nTime=T[keys[nIdx]];
    if(aIdx>=0){
      const s=T[keys[aIdx]],e=nTime;
      const pct=Math.min(100,Math.max(0,(now-s)/(e-s)*100));
      document.getElementById("prog-fill").style.width=pct.toFixed(1)+"%";
      document.getElementById("prog-l").textContent=PRAYERS[aIdx].en+" "+fmt(s);
      document.getElementById("prog-r").textContent=PRAYERS[nIdx].en+" "+fmt(e);
    }
  } else {
    // past Isha — progress toward tomorrow Fajr
    const tm=new Date(today);tm.setDate(tm.getDate()+1);
    nTime=calcT(tm).fajr;
    const s=T[keys[aIdx]];
    const pct=Math.min(100,Math.max(0,(now-s)/(nTime-s)*100));
    document.getElementById("prog-fill").style.width=pct.toFixed(1)+"%";
    document.getElementById("prog-l").textContent=PRAYERS[aIdx].en+" "+fmt(s);
    document.getElementById("prog-r").textContent="Fajr "+fmt(nTime);
  }

  const sw=aIdx!==lastAIdx;
  lastAIdx=aIdx;
  document.getElementById("list").innerHTML=PRAYERS.map((p,i)=>{
    const isA=aIdx===i;
    const isP=T[p.key]<now&&!isA;
    const cls="row"+(isA?" active":isP?" passed":" upcoming")+(sw?" in":"");
    const dl=sw?(i*0.055)+"s":"";
    return`<div class="${cls}" data-p="${p.key}" style="animation-delay:${dl};cursor:pointer" onclick="tapRow(this,'${p.key}')">
      <div class="row-icon">${p.icon}</div>
      <div class="row-info"><div class="row-name">${p.en}</div><div class="row-ar">${p.ar}</div></div>
      <div class="row-right">
        <div class="row-time">${fmt(T[p.key])}</div>
        ${isA?'<div class="row-badge">Now</div>':''}
        <div style="font-size:11px;color:var(--label4);margin-top:3px">Details ›</div>
      </div>
    </div>`;
  }).join("");
}

function tick(){
  const now=new Date();
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const T=calcT(today);
  const keys=PRAYERS.map(p=>p.key);
  let aIdx2=-1;
  for(let i=0;i<keys.length;i++) if(now>=T[keys[i]]) aIdx2=i;
  let nIdx=-1;
  for(let i=0;i<keys.length;i++) if(T[keys[i]]>now){nIdx=i;break;}
  let nTime,nName;
  if(nIdx>=0){nTime=T[keys[nIdx]];nName=PRAYERS[nIdx].en;}
  else{const tm=new Date(today);tm.setDate(tm.getDate()+1);nTime=calcT(tm).fajr;nName="Fajr";}
  const diff=nTime-now;
  const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
  document.getElementById("cd").textContent=(h>0?h+"h "+String(m).padStart(2,"0")+"m":String(m).padStart(2,"0")+":"+String(s).padStart(2,"0"))+" until "+nName;
  if(aIdx2>=0&&nIdx>=0){
    const s2=T[keys[aIdx2]],e=T[keys[nIdx]];
    const pct=Math.min(100,Math.max(0,(now-s2)/(e-s2)*100));
    document.getElementById("prog-fill").style.width=pct.toFixed(1)+"%";
  }
  if(now.getSeconds()===0) render();
}

// theme
function applyTheme(key){
  const t=THEMES[key]||THEMES.default;
  const r=document.documentElement.style;
  r.setProperty("--bg-hero",t.hero);
  r.setProperty("--hero-glow",t.glow);
  r.setProperty("--accent",t.accent);
  r.setProperty("--accent-soft",t.accentSoft);
  r.setProperty("--accent-glow",t.glow);
  // shift the entire background to the prayer color (CSS transition handles the animation)
  const bgEl = document.getElementById("bg-tint");
  bgEl.style.backgroundColor = t.bg;
  r.setProperty("--bg", t.bg);
}

function vibeCheck(){
  const now=new Date();
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const T=calcT(today);
  const keys=PRAYERS.map(p=>p.key);
  const W=15*60*1000;
  let aIdx=-1;
  for(let i=0;i<keys.length;i++) if(now>=T[keys[i]]) aIdx=i;
  applyTheme(aIdx>=0?keys[aIdx]:"default");
  let hb=false;
  for(let i=0;i<keys.length;i++) if(Math.abs(now-T[keys[i]])<=W){hb=true;break;}
  if(!hb&&aIdx===keys.length-1){
    const tm=new Date(today);tm.setDate(tm.getDate()+1);
    if(Math.abs(now-calcT(tm).fajr)<=W) hb=true;
  }
  const ring=document.getElementById("hb");
  hb?ring.classList.add("on"):ring.classList.remove("on");
}

// location
function initLoc(){
  if(!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos=>{
    LAT=pos.coords.latitude; LNG=pos.coords.longitude;
    fetch("https://nominatim.openstreetmap.org/reverse?lat="+LAT+"&lon="+LNG+"&format=json")
      .then(r=>r.json()).then(d=>{
        const city=d.address.city||d.address.town||d.address.village||"Your Location";
        document.getElementById("hero-city").textContent=city;
      }).catch(()=>{});
    render(); vibeCheck();
    const b=qibla();
    document.getElementById("q-bearing").textContent=Math.round(b)+"°";
    document.getElementById("needle").style.transform="rotate("+b+"deg)";
  },()=>{},{enableHighAccuracy:true,timeout:8000});
}

// qibla
const MECCA={lat:21.3891,lng:39.8579};
function qibla(){
  const r=d=>d*Math.PI/180;
  const dl=r(MECCA.lng-LNG);
  const x=Math.sin(dl)*Math.cos(r(MECCA.lat));
  const y=Math.cos(r(LAT))*Math.sin(r(MECCA.lat))-Math.sin(r(LAT))*Math.cos(r(MECCA.lat))*Math.cos(dl);
  return((Math.atan2(x,y)*180/Math.PI)+360)%360;
}
const QB=qibla();
document.getElementById("q-bearing").textContent=Math.round(QB)+"°";
document.getElementById("needle").style.transform="rotate("+QB+"deg)";

document.getElementById("q-btn").addEventListener("click",async()=>{
  if(typeof DeviceOrientationEvent!=="undefined"&&typeof DeviceOrientationEvent.requestPermission==="function"){
    try{const p=await DeviceOrientationEvent.requestPermission();if(p==="granted")startCompass();}catch(e){}
  } else startCompass();
});

let sa=null;
function startCompass(){
  document.getElementById("q-btn").style.display="none";
  window.addEventListener("deviceorientationabsolute",oh,true);
  window.addEventListener("deviceorientation",oh,true);
}
function oh(e){
  const h=e.webkitCompassHeading!=null?e.webkitCompassHeading:-(e.alpha||0);
  let raw=(qibla()-h+360)%360;
  if(sa===null) sa=raw;
  let d=raw-sa; if(d>180)d-=360; if(d<-180)d+=360;
  sa+=d*0.15; sa=(sa+360)%360;
  document.getElementById("needle").style.transform="rotate("+sa.toFixed(1)+"deg)";
}

// ── Push Server config — fill in after deploying Cloudflare Worker ──
const PUSH_SERVER = 'https://prayer-push.YOUR_SUBDOMAIN.workers.dev'; // replace after deploy
const VAPID_PUBLIC_KEY = 'REPLACE_WITH_YOUR_VAPID_PUBLIC_KEY';        // from: node gen-keys.js

function urlBase64ToUint8Array(b64u) {
  const pad = '='.repeat((4 - b64u.length % 4) % 4);
  const b64 = (b64u + pad).replace(/-/g, '+').replace(/_/g, '/');
  return Uint8Array.from(atob(b64), c => c.charCodeAt(0));
}

// Build next 7 days of prayer times to send to the server
function buildPrayerPayload() {
  const prayers = [];
  const now = new Date();
  for (let d = 0; d < 7; d++) {
    const date = new Date(now.getFullYear(), now.getMonth(), now.getDate() + d);
    const T = calcT(date);
    PRAYERS.forEach(p => {
      prayers.push({ name: p.en, arabic: p.ar, time: T[p.key].getTime() });
    });
  }
  return prayers;
}

async function subscribePush() {
  if (!('PushManager' in window)) { toast('Push not supported on this browser'); return; }
  const reg = await navigator.serviceWorker.ready;
  let sub = await reg.pushManager.getSubscription();
  if (!sub) {
    try {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
      });
    } catch(e) {
      toast('Push subscription failed'); console.error(e); return;
    }
  }
  // Send subscription + 7 days of prayer times to the server
  try {
    const res = await fetch(PUSH_SERVER + '/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ subscription: sub.toJSON(), prayers: buildPrayerPayload() }),
    });
    if (!res.ok) throw new Error('Server ' + res.status);
    toast('Notifications active! 🕌');
    localStorage.setItem('notif', '1');
    document.getElementById('notif-btn').classList.add('on');
  } catch(e) {
    toast('Server error — check push server'); console.error(e);
  }
}

async function unsubscribePush() {
  const reg = await navigator.serviceWorker.ready;
  const sub = await reg.pushManager.getSubscription();
  if (sub) {
    fetch(PUSH_SERVER + '/unsubscribe', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ endpoint: sub.endpoint }),
    }).catch(() => {});
    await sub.unsubscribe();
  }
  localStorage.removeItem('notif');
  document.getElementById('notif-btn').classList.remove('on');
  toast('Notifications off');
}

// Refresh server with updated prayer times each day when app opens
async function refreshPushPrayers() {
  if (localStorage.getItem('notif') !== '1') return;
  if (Notification.permission !== 'granted') return;
  const reg = await navigator.serviceWorker.ready;
  const sub = await reg.pushManager.getSubscription();
  if (!sub) return;
  fetch(PUSH_SERVER + '/subscribe', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ subscription: sub.toJSON(), prayers: buildPrayerPayload() }),
  }).catch(() => {});
}

// notifications
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3000);}

async function reqNotif(){
  if(!("Notification" in window)){toast("Notifications not supported");return;}
  // Toggle off if already on
  if(localStorage.getItem("notif")==="1"){
    await unsubscribePush();
    return;
  }
  const p=await Notification.requestPermission();
  if(p==="granted"){
    await subscribePush();
  } else {
    toast("Allow notifications in Settings");
  }
}
document.getElementById("notif-btn").addEventListener("click",reqNotif);

function tapRow(el, prayerKey){
  anime({ targets: el, scale: [1, 0.962, 1], duration: 280, easing: "spring(1, 120, 18, 0)" });
  setTimeout(()=>openDetail(prayerKey), 70);
}

function openDetail(prayerKey){
  const now = new Date();
  const today = new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const T = calcT(today);
  const info = PRAYER_INFO[prayerKey];
  const prayer = PRAYERS.find(p=>p.key===prayerKey);
  const detail = document.getElementById("detail-screen");
  const glowColor = info.colorSoft.replace("0.15","0.22");

  // set CSS vars on the detail screen
  detail.style.setProperty("--detail-color", info.color);
  detail.style.setProperty("--detail-soft", info.colorSoft);
  detail.style.setProperty("--detail-glow", glowColor);

  // populate
  document.getElementById("d-nav-title").textContent = prayer.en;
  const iconEl = document.getElementById("d-icon");
  iconEl.textContent = prayer.icon;
  iconEl.style.background = info.colorSoft;
  document.getElementById("d-name").textContent = prayer.en;
  document.getElementById("d-ar").textContent = prayer.ar;
  document.getElementById("d-time").textContent = fmt(T[prayerKey]);
  document.getElementById("d-desc").textContent = info.desc;

  // rakats
  document.getElementById("d-rakats").innerHTML = info.rakats.map(r=>
    `<div class="rakat-chip">
      <div class="rakat-dot" style="background:${r.color}"></div>
      <span class="rakat-label">${r.label}</span>
      <span class="rakat-sub">${r.sub}</span>
    </div>`
  ).join("");

  // window
  const wStart = T[prayerKey];
  let wEnd;
  if(info.windowEnd==="fajr"){
    const tm = new Date(today); tm.setDate(tm.getDate()+1);
    wEnd = calcT(tm).fajr;
  } else { wEnd = T[info.windowEnd]; }
  document.getElementById("d-wstart").textContent = fmt(wStart);
  document.getElementById("d-wend").textContent   = fmt(wEnd);
  const pct = now>wStart ? Math.min(100,(now-wStart)/(wEnd-wStart)*100) : 0;
  const fill = document.getElementById("d-wfill");
  fill.style.background = info.color;
  fill.style.width = "0%";
  fill.dataset.pct = pct.toFixed(1);

  // hadith
  document.getElementById("d-hadith").textContent = "“" + info.hadith + "”";
  document.getElementById("d-hadith-src").textContent = info.hadithSrc;

  // set initial states for animation targets
  anime.set(["#d-icon","#d-name","#d-ar","#d-time","#d-desc"],{opacity:0,translateY:20});
  anime.set(["#d-card-rakats","#d-card-window","#d-card-hadith"],{opacity:0,translateY:14});
  anime.set("#d-rakats .rakat-chip",{opacity:0,translateX:16});

  // show screen
  detail.style.display = "block";
  detail.scrollTop = 0;
  document.body.style.overflow = "hidden";
  detail.style.transform = "translateY(100%)";

  // 1. spring slide up (full screen)
  anime({ targets: detail, translateY:["100%","0%"], duration:500, easing:"spring(1, 80, 11, 0)" });

  // 2. hero elements stagger in
  anime({ targets:["#d-icon","#d-name","#d-ar","#d-time","#d-desc"],
    opacity:[0,1], translateY:[20,0],
    delay:anime.stagger(60,{start:160}), duration:400, easing:"easeOutCubic" });

  // 3. cards fade up
  anime({ targets:["#d-card-rakats","#d-card-window","#d-card-hadith"],
    opacity:[0,1], translateY:[14,0],
    delay:anime.stagger(70,{start:220}), duration:360, easing:"easeOutCubic" });

  // 4. rakat chips spring in staggered
  anime({ targets:"#d-rakats .rakat-chip",
    opacity:[0,1], translateX:[16,0],
    delay:anime.stagger(60,{start:320}), duration:400, easing:"spring(1,90,14,0)" });

  // 5. window bar fill
  setTimeout(()=>{
    anime({ targets: fill, width: fill.dataset.pct+"%", duration:1000, easing:"easeOutQuart" });
  }, 320);
}

function closeDetail(){
  const detail = document.getElementById("detail-screen");
  anime({ targets: detail, translateY:"100%", duration:400, easing:"easeInCubic",
    complete:()=>{ detail.style.display="none"; detail.style.transform=""; document.body.style.overflow=""; }
  });
}

// ── Swipe-down to dismiss detail screen ──
(function initDetailSwipe(){
  const detail = document.getElementById("detail-screen");
  let startY=0, lastY=0, dragging=false;
  const THRESHOLD = 0.28; // 28% of screen = dismiss

  detail.addEventListener("touchstart", e=>{
    startY = e.touches[0].clientY;
    lastY  = startY;
    dragging = false;
  },{ passive:true });

  detail.addEventListener("touchmove", e=>{
    lastY = e.touches[0].clientY;
    const dy = lastY - startY;
    if(detail.scrollTop <= 0 && dy > 0){
      dragging = true;
      // slight rubber-band resistance
      const drag = dy * 0.72;
      detail.style.transition = "none";
      detail.style.transform  = "translateY("+drag+"px)";
    } else if(dragging && dy <= 2){
      dragging = false;
      anime({ targets: detail, translateY:0, duration:280, easing:"spring(1,90,15,0)" });
      detail.style.transition="";
    }
  },{ passive:true });

  detail.addEventListener("touchend", ()=>{
    if(!dragging){ detail.style.transition=""; return; }
    const dy = lastY - startY;
    detail.style.transition = "";
    if(dy > window.innerHeight * THRESHOLD){
      closeDetail();
    } else {
      anime({ targets: detail, translateY:0, duration:340, easing:"spring(1,85,14,0)" });
    }
    dragging = false;
  },{ passive:true });
})();
